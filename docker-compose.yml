version: '3.8'

services:
  laravel:
    build:
      context: ./docker
    container_name: sorah_travel_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    expose:
      - "9000"

  nginx:
    image: nginx:alpine
    container_name: sorah_travel_nginx
    restart: unless-stopped
    ports:
      - "20007:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
